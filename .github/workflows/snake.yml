name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # runs once a day
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Yash-dott
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?color_snake=#a855f7&color_dots=#161b22,#39d353,#39d353,#39d353,#39d353
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Push output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
